<!doctype html>
<html><head><meta charset="utf-8"><title>PromptWorld</title>
<style>
  :root{color-scheme:dark}
  body{margin:0;font:15px/1.5 ui-sans-serif,system-ui,sans-serif;background:#0b0d10;color:#e6e8eb}
  header{padding:14px 18px;border-bottom:1px solid #1c2127;font-weight:600;letter-spacing:.3px}
  header span{opacity:.5;font-weight:400}
  #log{max-width:760px;margin:0 auto;padding:18px;display:flex;flex-direction:column;gap:12px}
  .msg{padding:10px 14px;border-radius:12px;white-space:pre-wrap;max-width:88%}
  .you{align-self:flex-end;background:#1d4ed8}
  .bot{align-self:flex-start;background:#171b21;border:1px solid #232a32}
  form{position:sticky;bottom:0;max-width:760px;margin:0 auto;display:flex;gap:8px;padding:14px 18px;background:#0b0d10}
  input{flex:1;padding:11px 14px;border-radius:10px;border:1px solid #232a32;background:#11151a;color:#e6e8eb;font:inherit}
  button{padding:11px 18px;border:0;border-radius:10px;background:#1d4ed8;color:#fff;font:inherit;cursor:pointer}
  button:disabled{opacity:.5}
</style></head><body>
<header>PromptWorld <span>— talk to your engineer-CEO</span></header>
<div id="log"></div>
<form id="f"><input id="m" placeholder="Message the engineer-CEO…" autocomplete="off" autofocus><button id="b">Send</button></form>
<script>
const log=document.getElementById('log'),f=document.getElementById('f'),m=document.getElementById('m'),b=document.getElementById('b');
function add(t,who){const d=document.createElement('div');d.className='msg '+who;d.textContent=t;log.appendChild(d);window.scrollTo(0,document.body.scrollHeight);return d;}
f.onsubmit=async(e)=>{e.preventDefault();const text=m.value.trim();if(!text)return;add(text,'you');m.value='';b.disabled=true;
  const wait=add('…','bot');
  try{const r=await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({message:text})});
       const j=await r.json();wait.textContent=j.reply||j.error||'(no reply)';}
  catch(err){wait.textContent='error: '+err;}
  b.disabled=false;m.focus();};
</script></body></html>
